<!doctype html><html lang="es"><head><meta charset="utf-8"><title>Diagnóstico assets sixseven</title><style>body{font-family:Arial,sans-serif;background:#140e1d;color:white;padding:30px}.card{border:1px solid #6d5a75;border-radius:16px;padding:18px;margin:12px;display:inline-flex;align-items:center;gap:14px;background:#24192e}img{width:48px;height:48px;object-fit:contain;background:#332540;border-radius:10px}.ok{color:#9ff0b0}.bad{color:#ff9c9c}</style></head><body><h1>Diagnóstico de assets sixseven</h1><p>Si aquí se ven los iconos, la ruta <code>assets/</code> está correcta.</p><div id="list"></div><script>const files=['assets/sixseven-logo.png','assets/icon-privacy.svg','assets/icon-rounds.svg','assets/icon-match.svg','assets/icon-chat.svg','assets/icon-creator.svg','assets/icon-user.svg','assets/icon-vote.svg'];const list=document.getElementById('list');files.forEach(src=>{const div=document.createElement('div');div.className='card';const img=document.createElement('img');img.src=src;const span=document.createElement('span');span.textContent=src+' ';const status=document.createElement('b');status.textContent='cargando...';img.onload=()=>{status.textContent='OK';status.className='ok'};img.onerror=()=>{status.textContent='NO CARGA';status.className='bad'};div.append(img,span,status);list.append(div);});</script></body></html>
